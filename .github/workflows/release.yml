name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CSC_IDENTITY_AUTO_DISCOVERY: false
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact: CVEase-win
          - os: macos-latest
            platform: mac
            arch: arm64
            artifact: CVEase-mac-arm64
          - os: macos-13
            platform: mac
            arch: x64
            artifact: CVEase-mac-x64
          - os: ubuntu-latest
            platform: linux
            artifact: CVEase-linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win dir --config.win.signAndEditExecutable=false --publish never

      - name: Package (macOS)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac dmg --config.mac.identity=null --publish never

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux AppImage --publish never

      - name: Zip (Windows)
        if: matrix.platform == 'win'
        shell: pwsh
        run: Compress-Archive -Path dist/win-unpacked -DestinationPath dist/${{ matrix.artifact }}.zip

      - name: Rename macOS artifact
        if: matrix.platform == 'mac'
        run: mv dist/*.dmg dist/${{ matrix.artifact }}.dmg

      - name: Rename Linux artifact
        if: matrix.platform == 'linux'
        run: mv dist/*.AppImage dist/${{ matrix.artifact }}.AppImage

      - name: Upload artifact (Windows)
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.zip

      - name: Upload artifact (macOS)
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.dmg

      - name: Upload artifact (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.AppImage

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/CVEase-win/CVEase-win.zip
            artifacts/CVEase-mac-arm64/CVEase-mac-arm64.dmg
            artifacts/CVEase-mac-x64/CVEase-mac-x64.dmg
            artifacts/CVEase-linux/CVEase-linux.AppImage
          generate_release_notes: true
